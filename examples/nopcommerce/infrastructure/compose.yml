name: aegis-nopcommerce

services:
  nopcommerce-db:
    image: postgres:17-alpine
    container_name: aegis-nopcommerce-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB must be set in examples/nopcommerce/infrastructure/.env}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER must be set in examples/nopcommerce/infrastructure/.env}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set in examples/nopcommerce/infrastructure/.env}
    healthcheck:
      test:
        [
          "CMD-SHELL",
          'pg_isready --username="$${POSTGRES_USER}" --dbname="$${POSTGRES_DB}"',
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 10s
    volumes:
      - nopcommerce_db_data:/var/lib/postgresql/data
      - ./postgres-init/001-enable-citext.sql:/docker-entrypoint-initdb.d/001-enable-citext.sql:ro
      - ./postgres-init/002-nextval-character-compat.sql:/docker-entrypoint-initdb.d/002-nextval-character-compat.sql:ro
      - ./postgres-init/003-datetime2fromparts-compat.sql:/docker-entrypoint-initdb.d/003-datetime2fromparts-compat.sql:ro
    networks:
      - nopcommerce_private

  nopcommerce-web:
    image: nopcommerceteam/nopcommerce:4.90.6
    container_name: aegis-nopcommerce-web
    restart: unless-stopped
    depends_on:
      nopcommerce-db:
        condition: service_healthy
    ports:
      - "${NOPCOMMERCE_PORT:-8080}:80"
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --quiet --tries=1 --spider http://127.0.0.1:80/ || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 30s
    volumes:
      - nopcommerce_app_data:/app/App_Data
      - nopcommerce_product_images:/app/wwwroot/images
    networks:
      - nopcommerce_private

networks:
  nopcommerce_private:
    name: aegis-nopcommerce-private
    driver: bridge

volumes:
  nopcommerce_db_data:
    name: aegis-nopcommerce-db-data
  nopcommerce_app_data:
    name: aegis-nopcommerce-app-data
  nopcommerce_product_images:
    name: aegis-nopcommerce-product-images
